name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check src tests
      - name: Tests
        run: python -m pytest
      - name: Smoke
        run: python -m robot_bench.cli run-all --config configs/synthetic.yaml --profile small --formats rlds,hdf5
